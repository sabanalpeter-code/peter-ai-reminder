name: Build Peter AI Reminder v3 APK

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.10.2

      - name: Generate Peter AI Reminder v3 project
        run: |
          mkdir -p app/src/main/java/com/peteraireminder
          mkdir -p app/src/main/res/values

          cat > settings.gradle <<'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }

          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }

          rootProject.name = 'Peter AI Reminder v3'
          include ':app'
          EOF

          cat > build.gradle <<'EOF'
          plugins {
              id 'com.android.application' version '8.7.3' apply false
          }
          EOF

          cat > app/build.gradle <<'EOF'
          plugins {
              id 'com.android.application'
          }

          android {
              namespace 'com.peteraireminder'
              compileSdk 35

              defaultConfig {
                  applicationId 'com.peteraireminder.v3'
                  minSdk 23
                  targetSdk 35
                  versionCode 3
                  versionName '3.0'
              }
          }
          EOF

          cat > app/src/main/res/values/styles.xml <<'EOF'
          <resources>
              <style name="AppTheme" parent="@android:style/Theme.Material.Light.NoActionBar">
                  <item name="android:fontFamily">sans</item>
                  <item name="android:windowLightStatusBar">true</item>
              </style>
          </resources>
          EOF

          cat > app/src/main/AndroidManifest.xml <<'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">

              <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />
              <uses-permission android:name="android.permission.RECORD_AUDIO" />
              <uses-permission android:name="android.permission.VIBRATE" />
              <uses-permission android:name="android.permission.WAKE_LOCK" />
              <uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED" />
              <uses-permission android:name="android.permission.USE_FULL_SCREEN_INTENT" />

              <queries>
                  <package android:name="com.facebook.orca" />
              </queries>

              <application
                  android:theme="@style/AppTheme"
                  android:label="Peter AI Reminder v3"
                  android:allowBackup="false"
                  android:supportsRtl="true">

                  <activity
                      android:name=".AlarmActivity"
                      android:exported="false"
                      android:showWhenLocked="true"
                      android:turnScreenOn="true" />

                  <activity
                      android:name=".VoiceAssistantActivity"
                      android:exported="false" />

                  <activity
                      android:name=".MainActivity"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>

                  <receiver
                      android:name=".AlarmReceiver"
                      android:exported="false" />

                  <receiver
                      android:name=".BootReceiver"
                      android:exported="false">
                      <intent-filter>
                          <action android:name="android.intent.action.BOOT_COMPLETED" />
                      </intent-filter>
                  </receiver>

              </application>
          </manifest>
          EOF

          cat > app/src/main/java/com/peteraireminder/ScheduleHelper.java <<'EOF'
          package com.peteraireminder;

          import android.app.AlarmManager;
          import android.app.PendingIntent;
          import android.content.Context;
          import android.content.Intent;
          import java.text.SimpleDateFormat;
          import java.util.Calendar;
          import java.util.Locale;

          public class ScheduleHelper {
              public static final String PREFS = "peter_prefs_v3";
              public static final String KEY_BASE_MODE = "base_mode";
              public static final String KEY_BASE_SUNDAY = "base_sunday";

              public static final String MODE_A = "A";
              public static final String MODE_B = "B";

              public static final String WEEK_A_NAME = "4 AM Week";
              public static final String WEEK_B_NAME = "11:30 AM Week";

              public static final String WEEK_A_SHIFT = "4:00 AM to 12:00 NN";
              public static final String WEEK_B_SHIFT = "11:30 AM to 7:30 PM";

              public static final int WEEK_A_REMINDER_HOUR = 2;
              public static final int WEEK_A_REMINDER_MINUTE = 40;

              public static final int WEEK_B_REMINDER_HOUR = 10;
              public static final int WEEK_B_REMINDER_MINUTE = 0;

              public static void initDefaults(Context context) {
                  if (!context.getSharedPreferences(PREFS, Context.MODE_PRIVATE).contains(KEY_BASE_MODE)) {
                      setCurrentWeekMode(context, MODE_A);
                  }
              }

              public static void setCurrentWeekMode(Context context, String mode) {
                  long baseSunday = mostRecentSundayStartMillis();
                  context.getSharedPreferences(PREFS, Context.MODE_PRIVATE)
                          .edit()
                          .putString(KEY_BASE_MODE, mode)
                          .putLong(KEY_BASE_SUNDAY, baseSunday)
                          .apply();
                  scheduleUpcoming(context);
              }

              public static String getBaseMode(Context context) {
                  initDefaults(context);
                  return context.getSharedPreferences(PREFS, Context.MODE_PRIVATE)
                          .getString(KEY_BASE_MODE, MODE_A);
              }

              public static long getBaseSunday(Context context) {
                  initDefaults(context);
                  return context.getSharedPreferences(PREFS, Context.MODE_PRIVATE)
                          .getLong(KEY_BASE_SUNDAY, mostRecentSundayStartMillis());
              }

              public static String getModeForDate(Context context, Calendar date) {
                  String baseMode = getBaseMode(context);
                  long baseSunday = getBaseSunday(context);
                  long targetSunday = sundayStartMillis(date);

                  long diff = targetSunday - baseSunday;
                  long weekMs = 7L * 24L * 60L * 60L * 1000L;
                  long weeks = diff / weekMs;

                  if (weeks < 0) weeks = 0;

                  boolean even = weeks % 2 == 0;
                  if (even) return baseMode;

                  return baseMode.equals(MODE_A) ? MODE_B : MODE_A;
              }

              public static boolean isMonday(Calendar date) {
                  return date.get(Calendar.DAY_OF_WEEK) == Calendar.MONDAY;
              }

              public static String getShiftForMode(String mode) {
                  return mode.equals(MODE_A) ? WEEK_A_SHIFT : WEEK_B_SHIFT;
              }

              public static String getModeName(String mode) {
                  return mode.equals(MODE_A) ? WEEK_A_NAME : WEEK_B_NAME;
              }

              public static int getReminderHour(String mode) {
                  return mode.equals(MODE_A) ? WEEK_A_REMINDER_HOUR : WEEK_B_REMINDER_HOUR;
              }

              public static int getReminderMinute(String mode) {
                  return mode.equals(MODE_A) ? WEEK_A_REMINDER_MINUTE : WEEK_B_REMINDER_MINUTE;
              }

              public static String getReminderText(String mode) {
                  return mode.equals(MODE_A) ? "2:40 AM" : "10:00 AM";
              }

              public static String todaySummary(Context context) {
                  Calendar today = Calendar.getInstance();
                  String day = dayName(today);

                  if (isMonday(today)) {
                      return "Peter, today is Monday. Monday is your fixed day off. No work alarm today. Use this day to rest, wash your uniform, check your money, charge your phone, and prepare for the next work day.";
                  }

                  String mode = getModeForDate(context, today);
                  return "Peter, today is " + day + ". Your schedule is " + getShiftForMode(mode) +
                          ". Your reminder time is " + getReminderText(mode) +
                          ". Current rotation is " + getModeName(mode) + ".";
              }

              public static String tomorrowSummary(Context context) {
                  Calendar tomorrow = Calendar.getInstance();
                  tomorrow.add(Calendar.DATE, 1);
                  String day = dayName(tomorrow);

                  if (isMonday(tomorrow)) {
                      return "Tomorrow is Monday, Peter. Monday is your fixed day off. No work alarm tomorrow.";
                  }

                  String mode = getModeForDate(context, tomorrow);
                  return "Tomorrow is " + day + ". Your shift is " + getShiftForMode(mode) +
                          ". Reminder time is " + getReminderText(mode) + ".";
              }

              public static String nextShiftSummary(Context context) {
                  Calendar now = Calendar.getInstance();

                  for (int i = 0; i < 15; i++) {
                      Calendar day = Calendar.getInstance();
                      day.add(Calendar.DATE, i);

                      if (isMonday(day)) continue;

                      String mode = getModeForDate(context, day);
                      Calendar reminder = (Calendar) day.clone();
                      reminder.set(Calendar.HOUR_OF_DAY, getReminderHour(mode));
                      reminder.set(Calendar.MINUTE, getReminderMinute(mode));
                      reminder.set(Calendar.SECOND, 0);
                      reminder.set(Calendar.MILLISECOND, 0);

                      if (reminder.getTimeInMillis() > now.getTimeInMillis()) {
                          return "Your next shift is " + dayName(day) + ", " + getShiftForMode(mode) +
                                  ". I will remind you at " + getReminderText(mode) + ".";
                      }
                  }

                  return "Peter, I could not calculate the next shift. Open the app and activate auto-rotation again.";
              }

              public static String sleepAdvice(Context context) {
                  Calendar today = Calendar.getInstance();

                  if (isMonday(today)) {
                      return "Peter, today is your day off. Rest properly, but do not sleep too late so your body stays ready for the next shift.";
                  }

                  String mode = getModeForDate(context, today);

                  if (mode.equals(MODE_A)) {
                      return "Since your shift is 4:00 AM to 12:00 NN and your reminder is 2:40 AM, you should sleep as early as possible. Best target is before 8:00 PM. Prepare your uniform, water, fare, and phone charger before sleeping.";
                  } else {
                      return "Since your shift is 11:30 AM to 7:30 PM and your reminder is 10:00 AM, you can sleep normally, but avoid sleeping too late. Best target is before 11:30 PM or midnight.";
                  }
              }

              public static String prepareAdvice(Context context) {
                  Calendar today = Calendar.getInstance();

                  if (isMonday(today)) {
                      return "Peter, today is Monday and you are off. No work preparation needed. Use today for rest, laundry, budgeting, phone charging, and checking your next schedule.";
                  }

                  String mode = getModeForDate(context, today);
                  return "Prepare for work, Peter. Your shift is " + getShiftForMode(mode) +
                          ". Bring your uniform, phone, charger, water, fare, food or light snack, and any OceanJet work essentials. Leave early and protect your energy.";
              }

              public static String rotationStatus(Context context) {
                  Calendar today = Calendar.getInstance();
                  String todayMode = getModeForDate(context, today);

                  Calendar nextSunday = Calendar.getInstance();
                  while (nextSunday.get(Calendar.DAY_OF_WEEK) != Calendar.SUNDAY || nextSunday.before(today)) {
                      nextSunday.add(Calendar.DATE, 1);
                  }

                  Calendar afterSunday = (Calendar) nextSunday.clone();
                  afterSunday.add(Calendar.DATE, 1);

                  String sundayMode = getModeForDate(context, nextSunday);

                  return "Current rotation today is " + getModeName(todayMode) +
                          ". On the coming Sunday, the rotation is " + getModeName(sundayMode) +
                          ". Monday remains your fixed day off.";
              }

              public static int scheduleUpcoming(Context context) {
                  cancelAll(context);

                  Calendar now = Calendar.getInstance();
                  int count = 0;

                  for (int i = 0; i < 28; i++) {
                      Calendar day = Calendar.getInstance();
                      day.add(Calendar.DATE, i);

                      if (!isMonday(day)) {
                          String mode = getModeForDate(context, day);

                          Calendar reminder = (Calendar) day.clone();
                          reminder.set(Calendar.HOUR_OF_DAY, getReminderHour(mode));
                          reminder.set(Calendar.MINUTE, getReminderMinute(mode));
                          reminder.set(Calendar.SECOND, 0);
                          reminder.set(Calendar.MILLISECOND, 0);

                          if (reminder.getTimeInMillis() > now.getTimeInMillis()) {
                              String message = "Peter, wake up. Today is " + dayName(day) +
                                      ". Your work is " + getShiftForMode(mode) +
                                      ". Prepare your uniform, phone, charger, water, fare, and food. Reminder time is " +
                                      getReminderText(mode) + ".";

                              scheduleAlarm(context, reminder.getTimeInMillis(), 2000 + i, "Work Reminder", message);
                              count++;
                          }
                      }

                      if (day.get(Calendar.DAY_OF_WEEK) == Calendar.SUNDAY) {
                          Calendar reset = (Calendar) day.clone();
                          reset.set(Calendar.HOUR_OF_DAY, 20);
                          reset.set(Calendar.MINUTE, 0);
                          reset.set(Calendar.SECOND, 0);
                          reset.set(Calendar.MILLISECOND, 0);

                          if (reset.getTimeInMillis() > now.getTimeInMillis()) {
                              String msg = "Peter, today is Sunday reset day. Your weekly schedule rotation changes every Sunday. Open the app and confirm if your next week schedule is still correct.";
                              scheduleAlarm(context, reset.getTimeInMillis(), 4000 + i, "Sunday Reset", msg);
                              count++;
                          }
                      }
                  }

                  return count;
              }

              private static void scheduleAlarm(Context context, long when, int requestCode, String title, String message) {
                  AlarmManager alarmManager = (AlarmManager) context.getSystemService(Context.ALARM_SERVICE);
                  if (alarmManager == null) return;

                  Intent intent = new Intent(context, AlarmReceiver.class);
                  intent.putExtra("title", title);
                  intent.putExtra("message", message);

                  PendingIntent pi = PendingIntent.getBroadcast(
                          context,
                          requestCode,
                          intent,
                          PendingIntent.FLAG_UPDATE_CURRENT | PendingIntent.FLAG_IMMUTABLE
                  );

                  Intent showIntent = new Intent(context, MainActivity.class);
                  PendingIntent showPi = PendingIntent.getActivity(
                          context,
                          requestCode + 50000,
                          showIntent,
                          PendingIntent.FLAG_UPDATE_CURRENT | PendingIntent.FLAG_IMMUTABLE
                  );

                  alarmManager.setAlarmClock(new AlarmManager.AlarmClockInfo(when, showPi), pi);
              }

              public static void cancelAll(Context context) {
                  AlarmManager alarmManager = (AlarmManager) context.getSystemService(Context.ALARM_SERVICE);
                  if (alarmManager == null) return;

                  for (int i = 0; i < 100; i++) {
                      cancelCode(context, alarmManager, 2000 + i);
                      cancelCode(context, alarmManager, 4000 + i);
                  }
              }

              private static void cancelCode(Context context, AlarmManager alarmManager, int requestCode) {
                  Intent intent = new Intent(context, AlarmReceiver.class);
                  PendingIntent pi = PendingIntent.getBroadcast(
                          context,
                          requestCode,
                          intent,
                          PendingIntent.FLAG_UPDATE_CURRENT | PendingIntent.FLAG_IMMUTABLE
                  );
                  alarmManager.cancel(pi);
              }

              public static long mostRecentSundayStartMillis() {
                  Calendar c = Calendar.getInstance();
                  c.set(Calendar.HOUR_OF_DAY, 0);
                  c.set(Calendar.MINUTE, 0);
                  c.set(Calendar.SECOND, 0);
                  c.set(Calendar.MILLISECOND, 0);

                  int diff = c.get(Calendar.DAY_OF_WEEK) - Calendar.SUNDAY;
                  c.add(Calendar.DATE, -diff);

                  return c.getTimeInMillis();
              }

              public static long sundayStartMillis(Calendar input) {
                  Calendar c = (Calendar) input.clone();
                  c.set(Calendar.HOUR_OF_DAY, 0);
                  c.set(Calendar.MINUTE, 0);
                  c.set(Calendar.SECOND, 0);
                  c.set(Calendar.MILLISECOND, 0);

                  int diff = c.get(Calendar.DAY_OF_WEEK) - Calendar.SUNDAY;
                  c.add(Calendar.DATE, -diff);

                  return c.getTimeInMillis();
              }

              public static String dayName(Calendar c) {
                  return new SimpleDateFormat("EEEE", Locale.US).format(c.getTime());
              }
          }
          EOF

          cat > app/src/main/java/com/peteraireminder/PhoneActions.java <<'EOF'
          package com.peteraireminder;

          import android.content.ClipData;
          import android.content.ClipboardManager;
          import android.content.Context;
          import android.content.Intent;
          import android.net.Uri;
          import android.widget.Toast;

          public class PhoneActions {
              public static void copyMessengerCommand(Context context) {
                  ClipboardManager clipboard = (ClipboardManager) context.getSystemService(Context.CLIPBOARD_SERVICE);
                  ClipData clip = ClipData.newPlainText("Peter AI Command", "Call mode. Prepare me for work.");
                  clipboard.setPrimaryClip(clip);
                  Toast.makeText(context, "Messenger command copied.", Toast.LENGTH_SHORT).show();
              }

              public static void openMessenger(Context context) {
                  try {
                      Intent launchIntent = context.getPackageManager().getLaunchIntentForPackage("com.facebook.orca");
                      if (launchIntent != null) {
                          launchIntent.addFlags(Intent.FLAG_ACTIVITY_NEW_TASK);
                          context.startActivity(launchIntent);
                      } else {
                          Intent web = new Intent(Intent.ACTION_VIEW, Uri.parse("https://m.me/"));
                          web.addFlags(Intent.FLAG_ACTIVITY_NEW_TASK);
                          context.startActivity(web);
                      }
                  } catch (Exception e) {
                      Toast.makeText(context, "Open Messenger manually.", Toast.LENGTH_LONG).show();
                  }
              }

              public static void openDialer(Context context) {
                  try {
                      Intent intent = new Intent(Intent.ACTION_DIAL);
                      intent.addFlags(Intent.FLAG_ACTIVITY_NEW_TASK);
                      context.startActivity(intent);
                  } catch (Exception e) {
                      Toast.makeText(context, "Open Phone app manually.", Toast.LENGTH_LONG).show();
                  }
              }
          }
          EOF

          cat > app/src/main/java/com/peteraireminder/MainActivity.java <<'EOF'
          package com.peteraireminder;

          import android.Manifest;
          import android.app.Activity;
          import android.content.Intent;
          import android.content.pm.PackageManager;
          import android.graphics.Color;
          import android.graphics.Typeface;
          import android.os.Build;
          import android.os.Bundle;
          import android.view.Gravity;
          import android.view.View;
          import android.widget.Button;
          import android.widget.LinearLayout;
          import android.widget.ScrollView;
          import android.widget.TextView;
          import android.widget.Toast;

          public class MainActivity extends Activity {
              private TextView status;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  requestNotificationPermission();
                  ScheduleHelper.initDefaults(this);

                  ScrollView scroll = new ScrollView(this);
                  LinearLayout root = new LinearLayout(this);
                  root.setOrientation(LinearLayout.VERTICAL);
                  root.setPadding(36, 45, 36, 45);
                  scroll.addView(root);

                  TextView title = new TextView(this);
                  title.setText("Peter AI Reminder v3");
                  title.setTextSize(29);
                  title.setTypeface(null, Typeface.BOLD);
                  title.setGravity(Gravity.CENTER);
                  title.setTextColor(Color.rgb(20, 30, 45));
                  root.addView(title);

                  TextView sub = new TextView(this);
                  sub.setText("\nVoice assistant + automatic rotating schedule.\nMonday is always day off.\nSunday is schedule changeover day.\n");
                  sub.setTextSize(16);
                  sub.setGravity(Gravity.CENTER);
                  root.addView(sub);

                  status = new TextView(this);
                  status.setTextSize(17);
                  status.setText(getDashboardText());
                  root.addView(status);

                  Button ask = makeButton("🎤 Ask Peter AI");
                  ask.setOnClickListener(new View.OnClickListener() {
                      @Override
                      public void onClick(View v) {
                          startActivity(new Intent(MainActivity.this, VoiceAssistantActivity.class));
                      }
                  });
                  root.addView(ask);

                  Button activate = makeButton("Activate Auto-Rotation Alarms");
                  activate.setOnClickListener(new View.OnClickListener() {
                      @Override
                      public void onClick(View v) {
                          int count = ScheduleHelper.scheduleUpcoming(MainActivity.this);
                          status.setText(getDashboardText() + "\n\nActivated " + count + " upcoming reminders.");
                          Toast.makeText(MainActivity.this, "Auto-rotation alarms activated.", Toast.LENGTH_LONG).show();
                      }
                  });
                  root.addView(activate);

                  Button modeA = makeButton("Set Current Week: 4 AM Week");
                  modeA.setOnClickListener(new View.OnClickListener() {
                      @Override
                      public void onClick(View v) {
                          ScheduleHelper.setCurrentWeekMode(MainActivity.this, ScheduleHelper.MODE_A);
                          status.setText(getDashboardText());
                          Toast.makeText(MainActivity.this, "Current week set to 4 AM Week.", Toast.LENGTH_LONG).show();
                      }
                  });
                  root.addView(modeA);

                  Button modeB = makeButton("Set Current Week: 11:30 AM Week");
                  modeB.setOnClickListener(new View.OnClickListener() {
                      @Override
                      public void onClick(View v) {
                          ScheduleHelper.setCurrentWeekMode(MainActivity.this, ScheduleHelper.MODE_B);
                          status.setText(getDashboardText());
                          Toast.makeText(MainActivity.this, "Current week set to 11:30 AM Week.", Toast.LENGTH_LONG).show();
                      }
                  });
                  root.addView(modeB);

                  Button messenger = makeButton("Open Messenger");
                  messenger.setOnClickListener(new View.OnClickListener() {
                      @Override
                      public void onClick(View v) {
                          PhoneActions.openMessenger(MainActivity.this);
                      }
                  });
                  root.addView(messenger);

                  Button copy = makeButton("Copy Messenger AI Command");
                  copy.setOnClickListener(new View.OnClickListener() {
                      @Override
                      public void onClick(View v) {
                          PhoneActions.copyMessengerCommand(MainActivity.this);
                      }
                  });
                  root.addView(copy);

                  Button cancel = makeButton("Cancel All App Alarms");
                  cancel.setOnClickListener(new View.OnClickListener() {
                      @Override
                      public void onClick(View v) {
                          ScheduleHelper.cancelAll(MainActivity.this);
                          status.setText(getDashboardText() + "\n\nAll app alarms cancelled.");
                          Toast.makeText(MainActivity.this, "All app alarms cancelled.", Toast.LENGTH_SHORT).show();
                      }
                  });
                  root.addView(cancel);

                  TextView footer = new TextView(this);
                  footer.setText(
                          "\nVoice commands to try:\n" +
                          "- What is my schedule today?\n" +
                          "- Am I off today?\n" +
                          "- Prepare me for work.\n" +
                          "- What time should I sleep?\n" +
                          "- What is my next shift?\n" +
                          "- Switch to 4 AM week.\n" +
                          "- Switch to 11:30 AM week.\n" +
                          "- Open Messenger.\n" +
                          "- Copy Messenger command.\n" +
                          "- Open dialer.\n"
                  );
                  footer.setTextSize(15);
                  root.addView(footer);

                  setContentView(scroll);
              }

              private Button makeButton(String text) {
                  Button b = new Button(this);
                  b.setText(text);
                  b.setTextSize(16);
                  return b;
              }

              private String getDashboardText() {
                  return "\nToday:\n" +
                          ScheduleHelper.todaySummary(this) +
                          "\n\nNext shift:\n" +
                          ScheduleHelper.nextShiftSummary(this) +
                          "\n\nRotation:\n" +
                          ScheduleHelper.rotationStatus(this) +
                          "\n\nReminder rules:\n" +
                          "4 AM Week = 4:00 AM to 12:00 NN, reminder at 2:40 AM.\n" +
                          "11:30 AM Week = 11:30 AM to 7:30 PM, reminder at 10:00 AM.\n";
              }

              private void requestNotificationPermission() {
                  if (Build.VERSION.SDK_INT >= 33) {
                      if (checkSelfPermission(Manifest.permission.POST_NOTIFICATIONS) != PackageManager.PERMISSION_GRANTED) {
                          requestPermissions(new String[]{Manifest.permission.POST_NOTIFICATIONS}, 100);
                      }
                  }
              }
          }
          EOF

          cat > app/src/main/java/com/peteraireminder/VoiceAssistantActivity.java <<'EOF'
