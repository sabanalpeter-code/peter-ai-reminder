          import android.Manifest;
          import android.app.Activity;
          import android.content.Intent;
          import android.content.pm.PackageManager;
          import android.graphics.Color;
          import android.graphics.Typeface;
          import android.os.Build;
          import android.os.Bundle;
          import android.speech.RecognitionListener;
          import android.speech.RecognizerIntent;
          import android.speech.SpeechRecognizer;
          import android.speech.tts.TextToSpeech;
          import android.view.Gravity;
          import android.view.View;
          import android.widget.Button;
          import android.widget.LinearLayout;
          import android.widget.ScrollView;
          import android.widget.TextView;
          import android.widget.Toast;
          import java.util.ArrayList;
          import java.util.Locale;

          public class VoiceAssistantActivity extends Activity {
              private TextView transcript;
              private TextView answer;
              private SpeechRecognizer speechRecognizer;
              private TextToSpeech tts;
              private String lastAnswer = "";

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  requestMicPermission();

                  tts = new TextToSpeech(this, new TextToSpeech.OnInitListener() {
                      @Override
                      public void onInit(int status) {
                          if (status == TextToSpeech.SUCCESS) {
                              tts.setLanguage(Locale.US);
                          }
                      }
                  });

                  ScrollView scroll = new ScrollView(this);
                  LinearLayout root = new LinearLayout(this);
                  root.setOrientation(LinearLayout.VERTICAL);
                  root.setPadding(36, 45, 36, 45);
                  scroll.addView(root);

                  TextView title = new TextView(this);
                  title.setText("Ask Peter AI");
                  title.setTextSize(28);
                  title.setTypeface(null, Typeface.BOLD);
                  title.setGravity(Gravity.CENTER);
                  title.setTextColor(Color.rgb(20, 30, 45));
                  root.addView(title);

                  TextView guide = new TextView(this);
                  guide.setText("\nTap the microphone and ask about your schedule, sleep, work preparation, rotation, or Messenger.\n");
                  guide.setTextSize(16);
                  guide.setGravity(Gravity.CENTER);
                  root.addView(guide);

                  transcript = new TextView(this);
                  transcript.setText("You said: ...");
                  transcript.setTextSize(17);
                  root.addView(transcript);

                  answer = new TextView(this);
                  answer.setText("\nAssistant answer will appear here.");
                  answer.setTextSize(18);
                  answer.setTypeface(null, Typeface.BOLD);
                  root.addView(answer);

                  Button listen = makeButton("🎤 Listen Now");
                  listen.setOnClickListener(new View.OnClickListener() {
                      @Override
                      public void onClick(View v) {
                          startListening();
                      }
                  });
                  root.addView(listen);

                  Button speakAgain = makeButton("Speak Answer Again");
                  speakAgain.setOnClickListener(new View.OnClickListener() {
                      @Override
                      public void onClick(View v) {
                          speak(lastAnswer.length() > 0 ? lastAnswer : "There is no answer yet.");
                      }
                  });
                  root.addView(speakAgain);

                  Button today = makeButton("Quick: Today Schedule");
                  today.setOnClickListener(new View.OnClickListener() {
                      @Override
                      public void onClick(View v) {
                          processCommand("what is my schedule today");
                      }
                  });
                  root.addView(today);

                  Button prepare = makeButton("Quick: Prepare Me");
                  prepare.setOnClickListener(new View.OnClickListener() {
                      @Override
                      public void onClick(View v) {
                          processCommand("prepare me for work");
                      }
                  });
                  root.addView(prepare);

                  Button sleep = makeButton("Quick: Sleep Advice");
                  sleep.setOnClickListener(new View.OnClickListener() {
                      @Override
                      public void onClick(View v) {
                          processCommand("what time should I sleep");
                      }
                  });
                  root.addView(sleep);

                  Button back = makeButton("Back to Dashboard");
                  back.setOnClickListener(new View.OnClickListener() {
                      @Override
                      public void onClick(View v) {
                          finish();
                      }
                  });
                  root.addView(back);

                  setContentView(scroll);
              }

              private Button makeButton(String text) {
                  Button b = new Button(this);
                  b.setText(text);
                  b.setTextSize(16);
                  return b;
              }

              private void startListening() {
                  if (Build.VERSION.SDK_INT >= 23) {
                      if (checkSelfPermission(Manifest.permission.RECORD_AUDIO) != PackageManager.PERMISSION_GRANTED) {
                          requestMicPermission();
                          Toast.makeText(this, "Allow microphone permission first.", Toast.LENGTH_LONG).show();
                          return;
                      }
                  }

                  if (!SpeechRecognizer.isRecognitionAvailable(this)) {
                      setAnswer("Voice recognition is not available on this phone. You can still use the quick buttons.");
                      return;
                  }

                  speechRecognizer = SpeechRecognizer.createSpeechRecognizer(this);
                  speechRecognizer.setRecognitionListener(new RecognitionListener() {
                      @Override public void onReadyForSpeech(Bundle params) {
                          transcript.setText("Listening...");
                      }

                      @Override public void onBeginningOfSpeech() { }

                      @Override public void onRmsChanged(float rmsdB) { }

                      @Override public void onBufferReceived(byte[] buffer) { }

                      @Override public void onEndOfSpeech() {
                          transcript.setText("Processing...");
                      }

                      @Override public void onError(int error) {
                          setAnswer("I did not hear clearly. Please tap Listen Now and try again.");
                      }

                      @Override public void onResults(Bundle results) {
                          ArrayList<String> matches = results.getStringArrayList(SpeechRecognizer.RESULTS_RECOGNITION);
                          if (matches != null && matches.size() > 0) {
                              String text = matches.get(0);
                              processCommand(text);
                          } else {
                              setAnswer("I did not understand. Please try again.");
                          }
                      }

                      @Override public void onPartialResults(Bundle partialResults) { }

                      @Override public void onEvent(int eventType, Bundle params) { }
                  });

                  Intent intent = new Intent(RecognizerIntent.ACTION_RECOGNIZE_SPEECH);
                  intent.putExtra(RecognizerIntent.EXTRA_LANGUAGE_MODEL, RecognizerIntent.LANGUAGE_MODEL_FREE_FORM);
                  intent.putExtra(RecognizerIntent.EXTRA_LANGUAGE, Locale.US);
                  intent.putExtra(RecognizerIntent.EXTRA_PROMPT, "Ask Peter AI");

                  speechRecognizer.startListening(intent);
              }

              private void processCommand(String command) {
                  transcript.setText("You said: " + command);

                  String q = command.toLowerCase(Locale.US);
                  String response;

                  if (containsAny(q, "switch to 4", "switch to four", "4 am week", "four am week", "set 4")) {
                      ScheduleHelper.setCurrentWeekMode(this, ScheduleHelper.MODE_A);
                      response = "Done, Peter. I set the current week to 4 AM Week. Your shift is 4:00 AM to 12:00 NN, and your reminder is 2:40 AM. Next Sunday will rotate to 11:30 AM Week.";
                      setAnswer(response);
                      return;
                  }

                  if (containsAny(q, "switch to 11", "switch to eleven", "11:30", "1130", "eleven thirty", "set 11")) {
                      ScheduleHelper.setCurrentWeekMode(this, ScheduleHelper.MODE_B);
                      response = "Done, Peter. I set the current week to 11:30 AM Week. Your shift is 11:30 AM to 7:30 PM, and your reminder is 10:00 AM. Next Sunday will rotate to 4 AM Week.";
                      setAnswer(response);
                      return;
                  }

                  if (containsAny(q, "activate alarm", "activate auto", "activate rotation", "set alarm", "schedule alarm")) {
                      int count = ScheduleHelper.scheduleUpcoming(this);
                      response = "Auto-rotation alarms are active, Peter. I scheduled " + count + " upcoming reminders. Monday stays protected as your day off.";
                      setAnswer(response);
                      return;
                  }

                  if (containsAny(q, "today", "schedule today", "my schedule")) {
                      response = ScheduleHelper.todaySummary(this);
                      setAnswer(response);
                      return;
                  }

                  if (containsAny(q, "tomorrow")) {
                      response = ScheduleHelper.tomorrowSummary(this);
                      setAnswer(response);
                      return;
                  }

                  if (containsAny(q, "am i off", "day off", "off today")) {
                      response = ScheduleHelper.todaySummary(this);
                      setAnswer(response);
                      return;
                  }

                  if (containsAny(q, "next shift", "next work", "next schedule")) {
                      response = ScheduleHelper.nextShiftSummary(this);
                      setAnswer(response);
                      return;
                  }

                  if (containsAny(q, "sleep", "what time should i sleep", "rest")) {
                      response = ScheduleHelper.sleepAdvice(this);
                      setAnswer(response);
                      return;
                  }

                  if (containsAny(q, "prepare", "ready for work", "work checklist")) {
                      response = ScheduleHelper.prepareAdvice(this);
                      setAnswer(response);
                      return;
                  }

                  if (containsAny(q, "rotation", "week mode", "current week")) {
                      response = ScheduleHelper.rotationStatus(this);
                      setAnswer(response);
                      return;
                  }

                  if (containsAny(q, "open messenger", "messenger")) {
                      response = "Opening Messenger, Peter. Send your AI command if you want call mode.";
                      setAnswer(response);
                      PhoneActions.openMessenger(this);
                      return;
                  }

                  if (containsAny(q, "copy command", "copy messenger")) {
                      response = "I copied your Messenger AI command: Call mode. Prepare me for work.";
                      setAnswer(response);
                      PhoneActions.copyMessengerCommand(this);
                      return;
                  }

                  if (containsAny(q, "open dialer", "call someone", "call mama", "call")) {
                      response = "Contact search will be upgraded in v3.1. For now, I will open your phone dialer so you can choose the contact safely.";
                      setAnswer(response);
                      PhoneActions.openDialer(this);
                      return;
                  }

                  if (containsAny(q, "photo", "photos", "picture", "january")) {
                      response = "Photo search by date will be added in v3.2. It will search your phone photos using permission and show matching dates or nearby results.";
                      setAnswer(response);
                      return;
                  }

                  response = "Peter, I can help with schedule, day off, sleep advice, work preparation, auto-rotation, Messenger, and basic phone actions. Try saying: What is my schedule today? Prepare me for work. Or switch to 11:30 AM week.";
                  setAnswer(response);
              }

              private boolean containsAny(String q, String... words) {
                  for (String w : words) {
                      if (q.contains(w)) return true;
                  }
                  return false;
              }

              private void setAnswer(String text) {
                  lastAnswer = text;
                  answer.setText("\n" + text);
                  speak(text);
              }

              private void speak(String text) {
                  try {
                      if (tts != null) {
                          if (Build.VERSION.SDK_INT >= 21) {
                              tts.speak(text, TextToSpeech.QUEUE_FLUSH, null, "peter_voice");
                          } else {
                              tts.speak(text, TextToSpeech.QUEUE_FLUSH, null);
                          }
                      }
                  } catch (Exception ignored) { }
              }

              private void requestMicPermission() {
                  if (Build.VERSION.SDK_INT >= 23) {
                      if (checkSelfPermission(Manifest.permission.RECORD_AUDIO) != PackageManager.PERMISSION_GRANTED) {
                          requestPermissions(new String[]{Manifest.permission.RECORD_AUDIO}, 200);
                      }
                  }
              }

              @Override
              protected void onDestroy() {
                  try {
                      if (speechRecognizer != null) {
                          speechRecognizer.destroy();
                          speechRecognizer = null;
                      }
                  } catch (Exception ignored) { }

                  try {
                      if (tts != null) {
                          tts.stop();
                          tts.shutdown();
                          tts = null;
                      }
                  } catch (Exception ignored) { }

                  super.onDestroy();
              }
          }
